name: Publish npm
on:
  release:
    types: [published]
permissions:
  contents: read
  id-token: write
jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify
      - run: npm publish --provenance --access public
        env:
          # Required only for the first release. Once npm trusted publishing is
          # configured, OIDC is used and this secret should be deleted.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
